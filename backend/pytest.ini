[pytest]
# Configurações do Pytest para o projeto RocketLab

# Diretório onde os testes estão localizados
testpaths = testes

# Padrão de nomes dos arquivos de teste
python_files = test_*.py

# Padrão de nomes das classes de teste
python_classes = Test*

# Padrão de nomes das funções de teste
python_functions = test_*

# Adicionar opções padrão quando rodar pytest
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Marcadores customizados
markers =
    unit: Testes unitários
    integration: Testes de integração
    slow: Testes lentos
    bug: Testes relacionados a bugs conhecidos

# Ignorar diretórios desnecessários
norecursedirs = 
    .git
    .venv
    __pycache__
    *.egg-info
    node_modules
